{% extends "base.html" %}

{% block content %}
    <h2>Load Your Data</h2>

    <form hx-post="/load" hx-target="#result">
        <label>Select Data Source:</label>
        <input type="text" name="source" placeholder="Enter CSV/Parquet file or DB URI" required>
        <button type="submit">Load Data</button>
    </form>

    <div id="result"></div>
{% endblock %}
