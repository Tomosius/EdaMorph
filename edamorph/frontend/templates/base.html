<!doctype html>
<html lang="en" class="h-full bg-gray-100 text-gray-800">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    {% if debug %}
    <!-- 🛠 Development: Vite dev server (correct paths!) -->
    <script type="module"
            src="http://localhost:5173/edamorph/frontend/src/ts/main.ts"></script>
    {% else %}
    <!-- 🚀 Production: Precompiled assets -->
    <script type="module"
            src="{{ url_for('static', path='dist/assets/main.js') }}"></script>
    <link rel="stylesheet"
          href="{{ url_for('static', path='dist/assets/main.css') }}">
    {% endif %}

    <title>{% block title %}EdaMorph{% endblock %}</title>
</head>

<body class="h-full bg-gray-100 text-gray-900">

<!-- 🔹 Top Navigation -->
<header class="fixed top-0 left-0 right-0 h-14 bg-gray-900 text-white shadow z-50">
    <div class="grid grid-cols-2 w-full px-4 h-full items-center justify-between">

        <!-- 🔹 Left: App name and context (one line) -->
        <div class="flex items-center gap-2 whitespace-nowrap overflow-hidden text-ellipsis">

            <!-- App name -->
            <a href="/" class="text-xl font-bold text-white whitespace-nowrap">EdaMorph</a>

            <!-- Dataset info -->
            <span class="text-sm text-gray-300 whitespace-nowrap overflow-hidden text-ellipsis">
    📂 Dataset: <strong class="font-semibold text-white">{{ current_dataset or 'None' }}</strong>
  </span>

        </div>

        <!-- 🔹 Right: Utility buttons -->
        <div class="flex flex-row-reverse items-center gap-2 whitespace-nowrap text-sm text-right">

            <button title="Toggle Theme" class="hover:text-gray-300">🌓</button>
            <button title="Help" class="hover:text-gray-300">Help</button>
            <button title="Export" class="hover:text-gray-300">Export</button>

        </div>

    </div>
</header>

<!-- 🔹 Layout: Sidebar + Main Content -->
<div class="flex pt-14 h-screen overflow-hidden">

    <!-- 🔹 Sidebar navigation (injected from partial) -->
    {% block sidebar %}
    {% include "sidebar_full_feature.html" %}
    {% endblock %}

    <!-- 🔹 Main content area (HTMX target) -->
    <main id="main-content" class="flex-1 overflow-y-auto bg-white p-4">
        {% block content %}
        <!-- Default fallback message -->
        <div class="text-gray-600 text-sm">No content loaded.</div>
        {% endblock %}
    </main>

</div>

</body>
</html>
