<!doctype html>
<html lang="en" class="h-full bg-gray-100 text-gray-800">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />

  <!-- ✅ use FastAPI’s Jinja syntax to link the CSS -->
  <link rel="stylesheet" href="{{ url_for('static', path='css/styles.css') }}">

  <title>FastAPI + Tailwind Test</title>
</head>
<body>

<body class="bg-gray-100 text-gray-900">

<!-- ✅ Sticky Navigation Bar -->
<header class="bg-gray-900 text-white fixed top-0 left-0 right-0 shadow-md z-50 h-16 flex items-center">
    <div class="w-full px-6 max-w-screen-xl mx-auto flex items-center justify-between">

        <!-- ✅ Brand (Always Fixed Left) -->
        <a href="/" class="text-xl font-bold flex items-center text-nowrap">
            <span>EdaMorph</span>
        </a>

        <!-- ✅ Navigation (Aligns Right) -->
        <div x-data="{ open: false }" class="relative flex-1 flex justify-end">
            <nav class="hidden md:flex space-x-2 text-nowrap">
                <button hx-get="/sidebar/io/import" hx-target="/io/import"
                        class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg transition">Change Source
                </button>
                <button hx-get="/sidebar/preprocess" hx-target="#sidebar"
                        class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg transition">Preprocess
                </button>
                <button hx-get="/sidebar/correlations" hx-target="#sidebar"
                        class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg transition">Correlations
                </button>
                <button hx-get="/sidebar/transform" hx-target="#sidebar"
                        class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg transition">Transform
                </button>
                <button hx-get="/sidebar/export" hx-target="#sidebar"
                        class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg transition">Export
                </button>
            </nav>

            <!-- ✅ Dropdown Button (If navigation doesn't fit) -->
            <button @click="open = !open" class="md:hidden bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg">
                ☰
            </button>

            <!-- ✅ Dropdown Menu -->
            <div x-show="open" @click.away="open = false"
                 x-transition:enter="transition ease-out duration-200 transform"
                 x-transition:enter-start="opacity-0 scale-95"
                 x-transition:enter-end="opacity-100 scale-100"
                 x-transition:leave="transition ease-in duration-150 transform"
                 x-transition:leave-start="opacity-100 scale-100"
                 x-transition:leave-end="opacity-0 scale-95"
                 class="absolute right-0 mt-3 w-48 bg-white border rounded-lg shadow-lg lg:hidden">
                <a href="#" hx-get="/sidebar/io/import" hx-target="/io/import"
                   class="block px-4 py-2 text-gray-700 hover:bg-gray-200 transition">📂 Change Source</a>
                <a href="#" hx-get="/sidebar/preprocess" hx-target="#sidebar"
                   class="block px-4 py-2 text-gray-700 hover:bg-gray-200 transition">🛠 Preprocess</a>
                <a href="#" hx-get="/sidebar/correlations" hx-target="#sidebar"
                   class="block px-4 py-2 text-gray-700 hover:bg-gray-200 transition">📊 Correlations</a>
                <a href="#" hx-get="/sidebar/transform" hx-target="#sidebar"
                   class="block px-4 py-2 text-gray-700 hover:bg-gray-200 transition">🔄 Transform</a>
                <a href="#" hx-get="/sidebar/export" hx-target="#sidebar"
                   class="block px-4 py-2 text-gray-700 hover:bg-gray-200 transition">📤 Export</a>
            </div>
        </div>
    </div>
</header>


</body>
</html>
